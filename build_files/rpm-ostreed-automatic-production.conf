# Production-mode update lock (S25)
#
# When /etc/tilefin/production-mode exists, rpm-ostreed-automatic.service
# silently no-ops on each timer firing. The flag file lives in /etc so it
# persists per-machine across image upgrades, rollbacks, and channel
# switches. Manual updates (bootc upgrade, rpm-ostree update, ujust
# update) go through rpm-ostreed.service and are unaffected.
[Unit]
ConditionPathExists=!/etc/tilefin/production-mode
