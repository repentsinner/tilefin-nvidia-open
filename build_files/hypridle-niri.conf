general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = niri msg action power-on-monitors
}

# Dim display after 4 minutes
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 10%       # save current brightness, set to 10%
    on-resume = brightnessctl -r                # restore brightness
}

# Turn off display after 5 minutes (skipped under S25 production mode)
listener {
    timeout = 300
    on-timeout = sh -c '[ ! -e /etc/tilefin/production-mode ] && niri msg action power-off-monitors'
    on-resume = niri msg action power-on-monitors
}

# Lock after 10 minutes (skipped under S25 production mode)
listener {
    timeout = 600
    on-timeout = sh -c '[ ! -e /etc/tilefin/production-mode ] && loginctl lock-session'
}

# Auto-suspend after 30 minutes idle (S26). Development mode only,
# outside business hours (Mon-Fri 08:00-18:00). The guard script holds
# in production mode and during business hours; manual suspend (nwg-bar
# Sleep, Mod+Shift+L) works at any time.
listener {
    timeout = 1800
    on-timeout = /usr/share/tilefin/scripts/auto-suspend.sh
}
